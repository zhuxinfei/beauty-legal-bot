# beauty-legal-bot Cloudflare Worker
name = "beauty-legal-bot"
main = "index.js"
compatibility_date = "2025-01-01"

# cron 表达式为 UTC 时间
# 0 0 * * 1 = 每周一 UTC 00:00 = 北京时间每周一 08:00
# 如需修改推送时间，调整 cron 即可（注意换算 UTC）
[triggers]
crons = ["0 0 * * 1"]

[[kv_namespaces]]
binding = "SEEN_NEWS"
id = "3b38ee9b31b74c4faee81ee5b92b3bdb"

[vars]
DEEPSEEK_MODEL = "deepseek-chat"
