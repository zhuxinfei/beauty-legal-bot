name: Beauty Legal Weekly Report

on:
  schedule:
    # GitHub may delay or drop schedules at the top of the hour.
    # 00:17 UTC = Monday 08:17 in Asia/Shanghai.
    - cron: '17 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_API_BASE_URL: https://hk.testvideo.site/v1
      AI_MODEL: gpt-5.4-mini
      REPORT_QUALITY_MODE: quality
      ANALYSIS_CANDIDATE_LIMIT: 220
      ANALYSIS_LEAD_LIMIT: 180
      AI_MAX_TOKENS: 16000
      REPORT_ITEMS_PER_MODULE: 12
      DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        run: FULL_SOURCE_SCAN=1 node worker/run-local.js

      - name: Deploy worker routes
        working-directory: worker
        run: npx wrangler deploy

      - name: Publish decision map asset
        working-directory: worker
        run: |
          if [ -f "../out/decision-map.svg" ]; then
            npx wrangler kv key put --remote --namespace-id=3b38ee9b31b74c4faee81ee5b92b3bdb "asset:decision-map:latest" --path ../out/decision-map.svg
          fi
          if [ -f "../out/decision-map.png" ]; then
            npx wrangler kv key put --remote --namespace-id=3b38ee9b31b74c4faee81ee5b92b3bdb "asset:decision-map:latest.png" --path ../out/decision-map.png
          fi
