name: Beauty Legal Weekly Report

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_API_BASE_URL: https://hk.testvideo.site/v1
      AI_MODEL: gpt-5.4-mini
      REPORT_QUALITY_MODE: quality
      ANALYSIS_CANDIDATE_LIMIT: 220
      ANALYSIS_LEAD_LIMIT: 180
      AI_MAX_TOKENS: 16000
      REPORT_ITEMS_PER_MODULE: 12
      DINGTALK_DOC_URL: https://alidocs.dingtalk.com/i/spaces/3YxXA9e5bv7NDXNy/overview
      DINGTALK_CLIENT_ID: ${{ secrets.DINGTALK_CLIENT_ID }}
      DINGTALK_CLIENT_SECRET: ${{ secrets.DINGTALK_CLIENT_SECRET }}
      DINGTALK_OPERATOR_ID: ${{ secrets.DINGTALK_OPERATOR_ID }}
      DINGTALK_WORKSPACE_ID: ${{ secrets.DINGTALK_WORKSPACE_ID }}
      DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        run: FULL_SOURCE_SCAN=1 node run-local.js
