name: Beauty Legal Weekly Report

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run pipeline
        working-directory: worker
        run: FULL_SOURCE_SCAN=1 node run-local.js

      - name: Commit report to site
        run: |
          REPORT_DATE=$(TZ=Asia/Shanghai date +%F)
          mkdir -p docs/reports
          if [ -f worker/out/latest-report.html ]; then
            cp worker/out/latest-report.html "docs/reports/${REPORT_DATE}.html"
          fi
          node scripts/update-site-index.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No site changes"
          else
            git commit -m "chore: weekly legal report ${REPORT_DATE}"
            git push origin HEAD:master
          fi

      - name: Push to CF KV
        if: always()
        working-directory: worker
        run: |
          REPORT_DATE=$(TZ=Asia/Shanghai date +%F)
          if [ -f "out/latest-report.html" ]; then
            npx wrangler kv key put --remote --namespace-id=3b38ee9b31b74c4faee81ee5b92b3bdb "report:${REPORT_DATE}" --path out/latest-report.html
            npx wrangler kv key put --remote --namespace-id=3b38ee9b31b74c4faee81ee5b92b3bdb "report:latest" --path out/latest-report.html
          fi
