name: Beauty Legal Weekly Report

on:
  schedule:
    # GitHub may delay or drop schedules at the top of the hour.
    # 00:17 UTC = Monday 08:17 in Asia/Shanghai.
    - cron: '17 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_API_BASE_URL: ${{ vars.AI_API_BASE_URL || 'https://hk.testvideo.site/v1' }}
      AI_MODEL: ${{ vars.AI_MODEL || 'gpt-5.5' }}
      MIN_SOURCE_COVERAGE: ${{ vars.MIN_SOURCE_COVERAGE || '0.9' }}
      MIN_CHINA_CRITICAL_COVERAGE: ${{ vars.MIN_CHINA_CRITICAL_COVERAGE || '0.9' }}
      REPORT_QUALITY_MODE: quality
      ANALYSIS_CANDIDATE_LIMIT: 40
      ANALYSIS_LEAD_LIMIT: 24
      AI_MAX_TOKENS: 6000
      REPORT_ITEMS_PER_MODULE: 12
      DETAIL_FETCH_ENABLED: 1
      DETAIL_CANDIDATE_LIMIT: 48
      DETAIL_FETCH_TIMEOUT_MS: 12000
      DETAIL_FETCH_CONCURRENCY: 8
      DETAIL_BROWSER_RECOVERY_LIMIT: 18
      FORCE_DELIVERY: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
      DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 34ddeeabd234776dc7c0f144257ecb7c
      CLOUDFLARE_KV_NAMESPACE_ID: 3b38ee9b31b74c4faee81ee5b92b3bdb
      PUBLIC_WORKER_BASE_URL: https://beauty-legal-bot.ai-cf.workers.dev
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install browser and Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          npx playwright install --with-deps chromium
          fc-match "Noto Sans CJK SC"

      - name: Deploy worker routes
        working-directory: worker
        run: npx wrangler deploy

      - name: Probe AI endpoint
        run: node worker/probe-ai.js

      - name: Run pipeline
        run: FULL_SOURCE_SCAN=1 node worker/run-local.js
